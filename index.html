<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Multi - Multilingual Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicio">
        <h1>WORDLE ENG</h1>
        <p>Escolha o idioma / Choose your language:</p>
        <button class="btn-idioma" onclick="startGameWithLanguage('pt')">Português</button>
        <button class="btn-idioma" onclick="startGameWithLanguage('en')">English</button>
    </div>

    <!-- TELA JOGO -->
    <div id="tela-jogo">
        <div class="instrucoes" id="msg-instr"></div>
        <div class="stats-container">
            <div><span id="score-label">SCORE</span>: <span id="score-val">0</span></div>
            <div><span id="round-label">RODADA/ROUND</span>: <span id="round-val">1</span></div>
        </div>
        <div class="grid" id="board"></div>
    </div>

    <!-- SCRIPTS MVC -->
    <script src="js/constants.js"></script>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>

</body>

</html>
